# Project Metadata
project_name: "3D_BBox_Prediction_Challenge"
experiment_name: "3D_BBox_Prediction"

# Data Configuration
data:
  root_dir: "/home/kiranraj-muthuraj/self_projects/3D_bounding_box_prediction/dl_challenge"
  batch_size: 4
  num_workers: 4

  # Input resolution for both RGB and organized point cloud
  target_size: [480, 640]

  # Final detector output resolution
  grid_size: [50, 70]

  train_split: 0.8

  # Physical world ranges used for x/z <-> grid mapping
  range_x: [-0.3, 0.3]
  range_z: [-0.8, 0.0]

  # Same z shift used in dataset preprocessing
  z_shift: 1.5

# Model Architecture
model:
  rgb_backbone: "resnet18"
  freeze_rgb_layers: true
  pc_channels: 3
  fusion_channels: 1024
  head_hidden_dim: 512
  dropout: 0.2
  gaussian_sigma: 0.6

# Training Hyperparameters
train:
  seed: 42
  max_epochs: 100
  learning_rate: 2e-4
  weight_decay: 0.01

  # Heatmap imbalance handling
  pos_weight: 30.0

  # Regression loss weighting
  reg_weight: 5.0

  # Classification loss weighting 
  cls_weight: 3.0

  # Segmentation loss weighting
  seg_weight: 0.1

  huber_delta: 1.0
  focal_alpha: 2.0
  focal_beta: 4.0

  # Optimizer / scheduler
  onecycle_pct_start: 0.1
  onecycle_div_factor: 25.0
  onecycle_final_div_factor: 10000.0

  # Runtime
  precision: "16-mixed"
  accelerator: "gpu"
  devices: 1
  gradient_clip_val: 1.0
  accumulate_grad_batches: 8
  deterministic: false

# Logging & Checkpoints
logging:
  use_wandb: true
  save_dir: "./checkpoints"
  log_every_n_steps: 10
  checkpoint_every_n_epochs: 1

# Evaluation defaults
eval:
  score_threshold: 0.15
  seg_threshold: 0.10
  nms_grid_distance: 2.0
  top_k: 20
  peak_pool_kernel: 3
  save_dir: "./results"

  # Camera intrinsics for projection
  camera_intrinsics:
    fx: 615.0
    fy: 615.0
    cx: 320.0
    cy: 240.0